<!DOCTYPE html>
<html lang="en">

<head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Internships | Internshala Clone | EasyJobs</title>
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../../index.css">
        <link rel="stylesheet" href="../styles/internshala_style.css">
        <link rel="stylesheet" href="../styles/global_font.css">
</head>

<body class="internshala-clone">

        <header class="main-header sticky">
                <div class="container header-content">
                        <a href="../../index.html" class="logo">
                                <svg width="34" height="34" viewBox="0 0 40 40" fill="none"
                                        xmlns="http://www.w3.org/2000/svg">
                                        <path d="M13 11V8C13 6.34315 14.3431 5 16 5H24C25.6569 5 27 6.34315 27 8V11"
                                                stroke="white" stroke-width="3" stroke-linecap="round" />
                                        <rect x="4" y="11" width="32" height="24" rx="5" fill="#2563eb" />
                                        <path d="M12 23L17 28L28 17" stroke="white" stroke-width="3.5"
                                                stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                Easy<span class="logo-accent">Jobs</span>
                        </a>

                        <nav class="nav-menu">
                                <ul>
                                        <li><a href="../../index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                                        <li><a href="../jobs.html" class="nav-link"><i class="fas fa-briefcase"></i> Jobs</a></li>
                                        <li><a href="../companies.html" class="nav-link"><i class="fas fa-building"></i> Companies</a></li>
                                        <li><a href="../internship.html" class="nav-link active"><i class="fas fa-user-graduate"></i> Internships</a></li>
                                        <li><a href="../my_applications.html" class="nav-link"><i class="fas fa-file-alt"></i> My Applications</a></li>
                                        <li><a href="../profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a></li>
                                        <li><a href="../contact.html" class="nav-link"><i class="fas fa-envelope"></i> Contact</a></li>
                                        <li><a href="../guidance.html" class="nav-link"><i class="fas fa-info-circle"></i> Guidance</a></li>
                                        <li><a href="../saved_jobs.html" class="nav-link" title="Saved Jobs"><i class="fas fa-bookmark"></i></a></li>
                                </ul>
                        </nav>

                        <div class="auth-buttons">
                                <a href="../register.html" class="btn-register"><i
                                                class="fas fa-user-plus"></i> Register</a>
                                <a href="../login.html" class="btn-login"><i
                                                class="fas fa-sign-in-alt"></i> Login</a>
                        </div>
                </div>
        </header>

        <div class="is-heading">
                <div class="container">
                        <h1 id="internships-count-text">Loading internships...</h1>
                </div>
        </div>

        <div class="is-container">
                <!-- Sidebar Filters -->
                <aside class="is-sidebar">
                        <h3><i class="fas fa-filter" style="color: #008BDC;"></i> Filters</h3>

                        <div class="filter-group">
                                <label>Profile</label>
                                <input type="text" id="filter-profile" placeholder="e.g. Web Development">
                        </div>

                        <div class="filter-group">
                                <label>Location</label>
                                <input type="text" id="filter-location" placeholder="e.g. Mumbai">
                        </div>

                        <div class="filter-group">
                                <label class="checkbox-item">
                                        <input type="checkbox" id="filter-wfh"> Work from home
                                </label>
                                <label class="checkbox-item">
                                        <input type="checkbox" id="filter-part-time"> Part-time
                                </label>
                        </div>

                        <div class="filter-group">
                                <label>Desired minimum monthly stipend (₹)</label>
                                <select id="filter-stipend">
                                        <option value="0">Any</option>
                                        <option value="2000">2,000</option>
                                        <option value="5000">5,000</option>
                                        <option value="10000">10,000</option>
                                        <option value="20000">20,000</option>
                                </select>
                        </div>

                        <button id="clear-filters"
                                style="width: 100%; padding: 12px; background: none; color: #008BDC; border: none; font-weight: 600; cursor: pointer; text-align: right; font-size: 14px;">Clear
                                all</button>
                </aside>

                <!-- Listing Content -->
                <div class="is-content" id="internships-container"></div></div><footer style="background: #333; color: #fff; padding: 40px 0; margin-top: 80px;">
                <div class="container" style="text-align: center;">
                        <p>&copy; 2026 EasyJobs | Inspired by Internshala | All Rights Reserved.</p>
                </div>
        </footer>

        <script src="../javascript/index.js""></script>
        <script src="../javascript/navbar_manager.js""></script>
        <script src="../javascript/internships.js""></script>
        <script src="../javascript/notifications.js""></script>
</body>

</html>
