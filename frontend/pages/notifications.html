<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications | EasyJobs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/index.css">
    <link rel="stylesheet" href="../styles/global_font.css">
    <style>
        .notif-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .notif-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .notif-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: #1e293b;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notif-header h1 i {
            color: #2563eb;
        }

        .notif-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #f1f5f9;
        }

        .notif-list-full {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .notif-item-full {
            padding: 20px 24px;
            border-bottom: 1px solid #f1f5f9;
            display: flex;
            gap: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        .notif-item-full:last-child {
            border-bottom: none;
        }

        .notif-item-full:hover {
            background: #f8fafc;
        }

        .notif-item-full.unread {
            background: #f0f7ff;
        }

        .notif-item-full.unread::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 4px;
            background: #2563eb;
        }

        .notif-icon-full {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.05);
        }

        .notif-content-full {
            flex: 1;
        }

        .notif-title-full {
            font-weight: 700;
            font-size: 16px;
            color: #1e293b;
            margin-bottom: 6px;
        }

        .notif-msg-full {
            font-size: 14px;
            color: #475569;
            line-height: 1.6;
        }

        .notif-time-full {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .notif-empty-full {
            padding: 100px 40px;
            text-align: center;
            color: #94a3b8;
        }

        .notif-empty-full i {
            font-size: 64px;
            margin-bottom: 20px;
            color: #e2e8f0;
        }

        .btn-mark-all {
            background: #f1f5f9;
            color: #475569;
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-mark-all:hover {
            background: #e2e8f0;
            color: #1e293b;
        }

        @media (max-width: 640px) {
            .notif-container { margin: 20px auto; }
            .notif-item-full { gap: 15px; padding: 16px; }
            .notif-icon-full { width: 44px; height: 44px; font-size: 18px; }
        }
    </style>
</head>

<body>
    <header class="main-header sticky">
        <div class="container header-content">
            <a href="../../index.html" class="logo"><i class="fas fa-briefcase"></i> Easy<span class="logo-accent">Jobs</span></a>

            <nav class="nav-menu">
                <ul>
                    <li><a href="../../index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="../jobs.html" class="nav-link"><i class="fas fa-briefcase"></i> Jobs</a></li>
                    <li><a href="../companies.html" class="nav-link"><i class="fas fa-building"></i> Companies</a></li>
                    <li><a href="../my_applications.html" class="nav-link"><i class="fas fa-file-alt"></i> My Applications</a></li>
                    <li><a href="../profile.html" class="nav-link"><i class="fas fa-user"></i> Profile</a></li>
                </ul>
            </nav>

            <div class="auth-buttons">
                <!-- Injected by index.js -->
            </div>
        </div>
    </header>

    <div class="breadcrumb container" style="margin-top:20px;">
        <a href="../../index.html"><i class="fas fa-chevron-left"></i> Back to Home</a>
        <span class="separator">/</span>
        <span class="current">Notifications</span>
    </div>

    <main class="notif-container">
        <div class="notif-header">
            <h1><i class="fas fa-bell"></i> Your Notifications</h1>
            <button id="mark-all-read-btn" class="btn-mark-all">Mark all as read</button>
        </div>

        <div class="notif-card">
            <div id="notifications-full-list" class="notif-list-full">
                <!-- Notifications will be injected here -->
                <div class="notif-empty-full">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading notifications...</p>
                </div>
            </div>
        </div>
    </main>

    <script ../javascript/index.js"></script>
    <script ../javascript/navbar_manager.js"></script>
    <script ../javascript/notifications.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const user = JSON.parse(localStorage.getItem("user") || "{}");
            if (!user.user_id) {
                window.location.href = "/frontend/pages/login.html";
                return;
            }

            const API_BASE = window.getEasyJobsAPI ? window.getEasyJobsAPI() : "/api";
            const listEl = document.getElementById("notifications-full-list");

            async function loadFullNotifications() {
                try {
                    const res = await fetch(`${API_BASE}/notifications/user/${user.user_id}`);
                    const notifications = await res.json();

                    if (!notifications || notifications.length === 0) {
                        listEl.innerHTML = `
                            <div class="notif-empty-full">
                                <i class="fas fa-bell-slash"></i>
                                <h3>No notifications yet</h3>
                                <p>We'll notify you when there's an update on your applications.</p>
                            </div>
                        `;
                        return;
                    }

                    listEl.innerHTML = notifications.map(n => {
                        const iconMap = {
                            success: { bg: "#dcfce7", color: "#16a34a", icon: "fa-check-circle" },
                            info:    { bg: "#eff6ff", color: "#2563eb", icon: "fa-info-circle" },
                            warning: { bg: "#fef3c7", color: "#d97706", icon: "fa-exclamation-triangle" },
                            error:   { bg: "#fef2f2", color: "#dc2626", icon: "fa-times-circle" }
                        };
                        const style = iconMap[n.type] || iconMap.info;
                        const timeStr = new Date(n.created_at).toLocaleString("en-IN", {
                            day: "2-digit", month: "long", year: "numeric", hour: "2-digit", minute: "2-digit"
                        });

                        return `
                            <div class="notif-item-full ${!n.is_read ? 'unread' : ''}" onclick="markAsRead(${n.id}, this)">
                                <div class="notif-icon-full" style="background:${style.bg}; color:${style.color};">
                                    <i class="fas ${style.icon}"></i>
                                </div>
                                <div class="notif-content-full">
                                    <div class="notif-title-full">${n.title}</div>
                                    <div class="notif-msg-full">${n.message}</div>
                                    <div class="notif-time-full"><i class="far fa-clock"></i> ${timeStr}</div>
                                </div>
                            </div>
                        `;
                    }).join("");

                } catch (err) {
                    listEl.innerHTML = `<div class="notif-empty-full"><i class="fas fa-exclamation-circle"></i><p>Failed to load notifications.</p></div>`;
                }
            }

            window.markAsRead = async (id, el) => {
                try {
                    await fetch(`${API_BASE}/notifications/${id}/read`, { method: "PATCH" });
                    el.classList.remove("unread");
                    // Update global badge
                    if (window.fetchUnreadCount) window.fetchUnreadCount();
                } catch (e) {}
            };

            document.getElementById("mark-all-read-btn").addEventListener("click", async () => {
                try {
                    await fetch(`${API_BASE}/notifications/user/${user.user_id}/read-all`, { method: "PATCH" });
                    document.querySelectorAll(".notif-item-full").forEach(el => el.classList.remove("unread"));
                    if (window.fetchUnreadCount) window.fetchUnreadCount();
                } catch (e) {}
            });

            loadFullNotifications();
        });
    </script>
</body>

</html>
