<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyJobs - Sign Up</title>
    <link rel="stylesheet" href="/frontend/styles/register.css">
    <link rel="stylesheet" href="/frontend/styles/global_font.css">

</head>

<body>
    <div class="signup-wrapper">
        <div class="image-section">
            <div class="image-content">
                <div class="illustration"></div>
                <h2>Join EasyJobs Today</h2>
                <p id="imageSubtitle">Connect with thousands of employers and discover your perfect career opportunity
                </p>
            </div>
        </div>

        <div class="form-section">
            <div class="logo-section">
                <div class="logo"><a href="/index.html" style="text-decoration: none; color: inherit;">EasyJobs</a>
                    <div class="tagline">Find Your Dream Career</div>
                </div>

                <div class="signup-header">
                    <h2>Create Account</h2>
                    <p id="formSubtitle">Start your journey to find the perfect job</p>
                </div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstname">First Name <span class="required-star">*</span></label>
                            <input type="text" id="firstname" name="firstname" placeholder="First name" required>
                        </div>
                        <div class="form-group">
                            <label for="lastname">Last Name <span class="required-star">*</span></label>
                            <input type="text" id="lastname" name="lastname" placeholder="Last name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address <span class="required-star">*</span></label>
                        <input type="email" id="email" name="email" placeholder="Enter your email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number <span class="required-star">*</span></label>
                        <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Password <span class="required-star">*</span></label>
                            <input type="password" id="password" name="password" placeholder="Create password" required
                                minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="confirmpassword">Confirm Password <span class="required-star">*</span></label>
                            <input type="password" id="confirmpassword" name="confirmpassword"
                                placeholder="Confirm password" required minlength="6">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="usertype">I am a <span class="required-star">*</span></label>
                        <select id="usertype" name="usertype" required>
                            <option value="">Select user type</option>
                            <option value="jobseeker">Job Seeker</option>
                            <option value="employer">Employer</option>
                        </select>
                    </div>

                    <!-- ===== EMPLOYER-SPECIFIC FIELDS (hidden by default) ===== -->
                    <div id="employerFields" class="employer-section">
                        <div class="employer-section-title">
                            <span class="employer-icon">&#127970;</span>
                            <span>Company Details</span>
                        </div>

                        <div class="form-group">
                            <label for="company_name">Company Name <span class="required-star">*</span></label>
                            <input type="text" id="company_name" name="company_name"
                                placeholder="Enter your company name">
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="industry">Industry <span class="required-star">*</span></label>
                                <select id="industry" name="industry">
                                    <option value="">Select industry</option>
                                    <option value="IT & Software">IT &amp; Software</option>
                                    <option value="Finance & Banking">Finance &amp; Banking</option>
                                    <option value="Healthcare">Healthcare</option>
                                    <option value="Education">Education</option>
                                    <option value="Manufacturing">Manufacturing</option>
                                    <option value="Retail & E-commerce">Retail &amp; E-commerce</option>
                                    <option value="Marketing & Advertising">Marketing &amp; Advertising</option>
                                    <option value="Construction & Real Estate">Construction &amp; Real Estate</option>
                                    <option value="Hospitality & Tourism">Hospitality &amp; Tourism</option>
                                    <option value="Media & Entertainment">Media &amp; Entertainment</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label for="company_size">Company Size <span class="required-star">*</span></label>
                                <select id="company_size" name="company_size">
                                    <option value="">Select size</option>
                                    <option value="1-10">1-10 employees</option>
                                    <option value="11-50">11-50 employees</option>
                                    <option value="51-200">51-200 employees</option>
                                    <option value="201-500">201-500 employees</option>
                                    <option value="501-1000">501-1000 employees</option>
                                    <option value="1000+">1000+ employees</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="designation">Your Designation <span class="required-star">*</span></label>
                            <input type="text" id="designation" name="designation"
                                placeholder="e.g. HR Manager, CEO, Recruiter">
                        </div>

                        <div class="form-group">
                            <label for="company_website">Company Website <span
                                    class="optional-label">(Optional)</span></label>
                            <input type="url" id="company_website" name="company_website"
                                placeholder="https://yourcompany.com">
                        </div>
                    </div>
                    <!-- ===== END EMPLOYER FIELDS ===== -->

                    <label class="terms-checkbox">
                        <input type="checkbox" id="terms" name="terms" required>
                        <span>I agree to the <a href="terms">Terms &amp; Conditions</a> and <a href="privacy">Privacy
                                Policy</a></span>
                    </label>

                    <button type="submit" id="createAccountBtn" class="signup-btn">Create Account</button>
                </form>

                <div class="divider">
                    <span>OR SIGN UP WITH</span>
                </div>

                <div class="login-link">
                    Already have an account? <a href="/frontend/pages/login.html">Login</a>
                </div>
            </div>
        </div>
    </div>
    <script src="/frontend/javascript/index.js"></script>
    <script src="/frontend/javascript/register.js"></script>
</body>

</html>
