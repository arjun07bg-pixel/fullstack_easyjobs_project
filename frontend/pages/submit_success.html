<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Submitted - EasyJobs</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../index.css">
    <link rel="stylesheet" href="../styles/global_font.css">
    <style>
        .success-container {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8fafc;
            padding: 2rem;
            animation: fadeIn 0.5s ease-out;
        }
        .success-card {
            background: #fff;
            padding: 4rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid #e2e8f0;
        }
        .success-icon {
            width: 100px;
            height: 100px;
            background: #dcfce7;
            color: #16a34a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 45px;
            margin: 0 auto 2rem;
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 15px rgba(22, 163, 74, 0.2);
        }
        .success-card h1 {
            color: #1e293b;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .success-card p {
            color: #64748b;
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: white;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
        .btn-secondary {
            background: #f1f5f9;
            color: #475569;
            padding: 14px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-secondary:hover {
            background: #e2e8f0;
            color: #1e293b;
            transform: translateY(-2px);
        }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <header class="main-header sticky">
        <div class="container header-content">
            <a href="../../index.html" class="logo"><i class="fas fa-briefcase"></i> Easy<span class="logo-accent">Jobs</span></a>

            <nav class="nav-menu">
                <ul>
                    <li><a href="../../index.html" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                    <li><a href="../jobs.html" class="nav-link"><i class="fas fa-briefcase"></i> Jobs</a></li>
                    <li><a href="../my_applications.html" class="nav-link active"><i class="fas fa-file-alt"></i> My Applications</a></li>
                </ul>
            </nav>

            <div class="auth-buttons">
            </div>
        </div>
    </header>

    <div class="success-container">
        <div class="success-card">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h1>Application Submitted!</h1>
            <p>Your application has been successfully sent to the employer. We'll notify you when there's an update on your status.</p>
            <div class="action-buttons">
                <a href="../my_applications.html" class="btn-primary"><i class="fas fa-file-alt"></i> View Applications</a>
                <a href="../jobs.html" class="btn-secondary"><i class="fas fa-search"></i> Find More Jobs</a>
            </div>
        </div>
    </div>
    
    <script src="../javascript/index.js""></script>
    <script src="../javascript/navbar_manager.js""></script>
</body>
</html>
