<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EasyJobs - Login</title>
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="../styles/global_font.css">

</head>

<body>
    <div class="login-container">
        <div class="logo-section">
            <div class="logo"><a href="../../index.html" style="text-decoration: none; color: inherit;">EasyJobs</a></div>
            <div class="tagline">Find Your Dream Career</div>
        </div>

        <div class="login-header">
            <h2>Welcome Back</h2>
            <p>Login to continue your job search</p>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password">
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    Remember me
                </label>
                <a href="#" class="forgot-password">Forgot Password?</a>
            </div>

            <button type="button" id="loginBtn" class="login-btn">Login</button>
        </div>

        <div id="otpSection" style="display: none;">
                    <div class="signup-header" style="text-align: center; margin-bottom: 20px;">
                        <h2 style="font-size: 20px; color: #1e293b;">Verify Identity</h2>
                        <p id="otpMsg" style="color: #64748b; font-size: 14px;">A 6-digit code was sent to your email.</p>
                        <div id="otpTimer" style="margin-top: 10px; font-weight: 700; color: #ef4444; font-size: 14px;">Time remaining: <span id="timerCount">50</span>s</div>
                    </div>
            <div class="form-group">
                <label for="otp">Enter 6-digit Code</label>
                <input type="text" id="otp" name="otp" maxlength="6" placeholder="######" style="text-align: center; letter-spacing: 5px; font-weight: 800; font-size: 20px;">
            </div>
            <button type="button" id="verifyOtpBtn" class="login-btn" style="background: #10b981;">Verify & Login</button>
            <button type="button" id="backToLogin" style="background:none; border:none; color:#6366f1; margin-top:15px; cursor:pointer; width:100%; font-weight:600;">Back to Login</button>
        </div>

        <div class="divider">
            <span>OR</span>
        </div>

        <div class="signup-link">
            Don't have an account? <a href="../register.html">Sign Up</a>
        </div>
    </div>
    <script ../javascript/index.js"></script>
    <script ../javascript/navbar_manager.js"></script>
    <script ../javascript/login.js"></script>
</body>

</html>
